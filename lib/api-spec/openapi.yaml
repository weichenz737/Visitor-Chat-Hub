openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Customer service chat system API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sessions
    description: Chat session operations
  - name: messages
    description: Message operations
  - name: agent
    description: Agent operations
  - name: admin
    description: Admin management operations
  - name: upload
    description: File upload operations
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
        '500':
          description: Failed to generate upload URL.

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sessions:
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new visitor session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionInput"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List sessions (filtered by ownership for agents, all for super_admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionSummary"
        "401":
          description: Not authenticated

  /sessions/visitor-resume:
    get:
      operationId: visitorResumeSession
      tags: [sessions]
      summary: Find most recent session for a visitor+agent pair
      parameters:
        - name: visitorId
          in: query
          required: true
          schema:
            type: string
        - name: agentId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Existing session found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: No existing session

  /sessions/stats:
    get:
      operationId: getSessionStats
      tags: [sessions]
      summary: Get session statistics (scoped by ownership)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStats"
        "401":
          description: Not authenticated

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get session by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
        "404":
          description: Not found

  /sessions/{id}/messages:
    get:
      operationId: getSessionMessages
      tags: [messages]
      summary: Get all messages for a session
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden

  /sessions/{id}/read:
    post:
      operationId: markSessionRead
      tags: [sessions]
      summary: Mark all messages in session as read
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadResult"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden

  /messages:
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message (REST fallback)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /agents:
    get:
      operationId: listPublicAgents
      tags: [agent]
      summary: List all active agents (public, for visitor selection)
      responses:
        "200":
          description: Active agents list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentPublic"

  /agent/login:
    post:
      operationId: agentLogin
      tags: [agent]
      summary: Agent login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentCredentials"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSession"
        "401":
          description: Invalid credentials

  /agent/me:
    get:
      operationId: getAgentMe
      tags: [agent]
      summary: Get current agent info
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Agent info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentInfo"
        "401":
          description: Not authenticated

  /admin/agents:
    get:
      operationId: adminListAgents
      tags: [admin]
      summary: List all agents (super_admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminAgent"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
    post:
      operationId: adminCreateAgent
      tags: [admin]
      summary: Create a new agent (super_admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentBody"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAgent"
        "400":
          description: Validation error
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
        "409":
          description: Username already taken

  /admin/agents/{id}:
    patch:
      operationId: adminUpdateAgent
      tags: [admin]
      summary: Update agent profile (super_admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentBody"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAgent"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: adminDeleteAgent
      tags: [admin]
      summary: Delete an agent (super_admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
        "404":
          description: Not found


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Session:
      type: object
      required: [id, visitorNickname, status, createdAt]
      properties:
        id:
          type: integer
        visitorNickname:
          type: string
        visitorId:
          type: ["string", "null"]
        status:
          type: string
          enum: [waiting, active, closed]
        createdAt:
          type: string
          format: date-time
        lastSeenAt:
          type: ["string", "null"]
          format: date-time
        agentId:
          type: ["integer", "null"]

    SessionSummary:
      type: object
      required: [id, visitorNickname, status, createdAt, unreadCount, isOnline]
      properties:
        id:
          type: integer
        visitorNickname:
          type: string
        status:
          type: string
          enum: [waiting, active, closed]
        createdAt:
          type: string
          format: date-time
        lastSeenAt:
          type: ["string", "null"]
          format: date-time
        agentId:
          type: ["integer", "null"]
        unreadCount:
          type: integer
        isOnline:
          type: boolean
        lastMessage:
          type: ["string", "null"]
        lastMessageAt:
          type: ["string", "null"]
          format: date-time

    SessionStats:
      type: object
      required: [total, online, waiting, active, unreadTotal]
      properties:
        total:
          type: integer
        online:
          type: integer
        waiting:
          type: integer
        active:
          type: integer
        unreadTotal:
          type: integer

    SessionInput:
      type: object
      required: [visitorNickname]
      properties:
        visitorNickname:
          type: string
          minLength: 1
        agentId:
          type: ["integer", "null"]
        visitorId:
          type: ["string", "null"]

    Message:
      type: object
      required: [id, sessionId, senderType, messageType, content, createdAt]
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        ownerId:
          type: ["integer", "null"]
        senderType:
          type: string
          enum: [visitor, agent]
        messageType:
          type: string
          enum: [text, image]
        content:
          type: string
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        readAt:
          type: ["string", "null"]
          format: date-time

    MessageInput:
      type: object
      required: [sessionId, senderType, messageType, content]
      properties:
        sessionId:
          type: integer
        senderType:
          type: string
          enum: [visitor, agent]
        messageType:
          type: string
          enum: [text, image]
        content:
          type: string
        imageUrl:
          type: ["string", "null"]

    ReadResult:
      type: object
      required: [count]
      properties:
        count:
          type: integer

    DeleteResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    AgentCredentials:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AgentSession:
      type: object
      required: [token, agentId, userId, username, role]
      properties:
        token:
          type: string
        agentId:
          type: integer
        userId:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [agent, super_admin]

    AgentInfo:
      type: object
      required: [agentId, userId, username, role]
      properties:
        agentId:
          type: integer
        userId:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [agent, super_admin]

    AgentPublic:
      type: object
      required: [id, displayName]
      properties:
        id:
          type: integer
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        introduction:
          type: ["string", "null"]

    AdminAgent:
      type: object
      required: [id, username, role, displayName, isActive, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [agent, super_admin]
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        introduction:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateAgentBody:
      type: object
      required: [username, password, displayName]
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 6
        displayName:
          type: string
          minLength: 1
        role:
          type: string
          enum: [agent, super_admin]
        introduction:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]

    UpdateAgentBody:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
        role:
          type: string
          enum: [agent, super_admin]
        introduction:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        isActive:
          type: boolean
        password:
          type: ["string", "null"]
          minLength: 6

    UploadResult:
      type: object
      required: [url, filename]
      properties:
        url:
          type: string
        filename:
          type: string

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
