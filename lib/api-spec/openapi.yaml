openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Customer service chat system API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sessions
    description: Chat session operations
  - name: messages
    description: Message operations
  - name: agent
    description: Agent operations
  - name: admin
    description: Admin management operations
  - name: upload
    description: File upload operations
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
        '500':
          description: Failed to generate upload URL.

  /upload/file:
    post:
      operationId: uploadFile
      tags: [upload]
      summary: Upload a file attachment (max 20MB)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResult'
        '400':
          description: Invalid or blocked file type
        '500':
          description: Upload failed

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sessions:
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new visitor session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionInput"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List sessions (filtered by ownership for agents, all for super_admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionSummary"
        "401":
          description: Not authenticated

  /sessions/visitor-resume:
    get:
      operationId: visitorResumeSession
      tags: [sessions]
      summary: Find most recent session for a visitor+agent pair
      parameters:
        - name: visitorId
          in: query
          required: true
          schema:
            type: string
        - name: agentId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Existing session found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: No existing session

  /sessions/stats:
    get:
      operationId: getSessionStats
      tags: [sessions]
      summary: Get session statistics (scoped by ownership)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStats"
        "401":
          description: Not authenticated

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get session by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
        "404":
          description: Not found

  /sessions/{id}/messages:
    get:
      operationId: getSessionMessages
      tags: [messages]
      summary: Get all messages for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: visitorId
          in: query
          schema:
            type: string
          description: Pass for visitor access without agent token
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden

  /sessions/{id}/read:
    post:
      operationId: markSessionRead
      tags: [sessions]
      summary: Mark visitor messages as read (agent)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadResult"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden

  /sessions/{id}/visitor-read:
    post:
      operationId: markSessionVisitorRead
      tags: [sessions]
      summary: Mark agent messages as read (visitor)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkSessionVisitorReadBody"
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadResult"
        "403":
          description: Forbidden
        "404":
          description: Not found

  /sessions/{id}/unread:
    get:
      operationId: getSessionUnread
      tags: [sessions]
      summary: Get unread message counts for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: visitorId
          in: query
          schema:
            type: string
          description: Pass for visitor access without agent token
      responses:
        "200":
          description: Unread counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionUnread"
        "403":
          description: Forbidden
        "404":
          description: Not found

  /sessions/{id}/notes:
    get:
      operationId: getSessionNotes
      tags: [sessions]
      summary: Get private session notes (internal, not visible to visitors)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionNotesResponse"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
        "404":
          description: Not found
    put:
      operationId: putSessionNotes
      tags: [sessions]
      summary: Upsert own private session note (current session owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutSessionNotesBody"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionNote"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
        "404":
          description: Not found

  /sessions/{id}/transfer:
    post:
      operationId: transferSession
      tags: [sessions]
      summary: Transfer session to another reception agent (or super_admin takeover)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferSessionBody"
      responses:
        "200":
          description: Transfer completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferSessionResponse"
        "400":
          description: Invalid request
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
        "404":
          description: Not found

  /sessions/{id}/transfers:
    get:
      operationId: getSessionTransfers
      tags: [sessions]
      summary: List transfer history for a session
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transfer history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionTransfersResponse"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
        "404":
          description: Not found

  /messages:
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message (REST fallback)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /agents:
    get:
      operationId: listPublicAgents
      tags: [agent]
      summary: List active reception agents (excludes super_admin)
      responses:
        "200":
          description: Active agents list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentPublic"

  /agents/{id}:
    get:
      operationId: getPublicAgent
      tags: [agent]
      summary: Get reception agent by ID for dedicated chat link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent public profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentPublic"
        "404":
          description: Agent not found or not available

  /agent/login:
    post:
      operationId: agentLogin
      tags: [agent]
      summary: Agent login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentCredentials"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSession"
        "401":
          description: Invalid credentials

  /agent/me:
    get:
      operationId: getAgentMe
      tags: [agent]
      summary: Get current agent info
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Agent info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentInfo"
        "401":
          description: Not authenticated
    patch:
      operationId: updateAgentMe
      tags: [agent]
      summary: Update current agent profile (display name and avatar)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentMeBody"
      responses:
        "200":
          description: Updated agent profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentInfo"
        "400":
          description: Validation error
        "401":
          description: Not authenticated

  /agent/me/password:
    patch:
      operationId: changeAgentPassword
      tags: [agent]
      summary: Change current agent password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  minLength: 1
                newPassword:
                  type: string
                  minLength: 6
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "400":
          description: Validation error
        "401":
          description: Not authenticated

  /admin/agents:
    get:
      operationId: adminListAgents
      tags: [admin]
      summary: List all agents (super_admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminAgent"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
    post:
      operationId: adminCreateAgent
      tags: [admin]
      summary: Create a new agent (super_admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentBody"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAgent"
        "400":
          description: Validation error
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
        "409":
          description: Username already taken

  /admin/agents/{id}:
    patch:
      operationId: adminUpdateAgent
      tags: [admin]
      summary: Update agent profile (super_admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentBody"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAgent"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: adminDeleteAgent
      tags: [admin]
      summary: Delete an agent (super_admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
        "404":
          description: Not found

  /agent/quick-replies:
    get:
      operationId: agentListQuickReplies
      tags: [agent]
      summary: List own quick replies
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search title or content
      responses:
        "200":
          description: Quick replies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuickReply"
        "401":
          description: Not authenticated
    post:
      operationId: agentCreateQuickReply
      tags: [agent]
      summary: Create a quick reply
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuickReplyBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickReply"
        "400":
          description: Validation error
        "401":
          description: Not authenticated

  /agent/quick-replies/{id}:
    patch:
      operationId: agentUpdateQuickReply
      tags: [agent]
      summary: Update own quick reply
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuickReplyBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickReply"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: agentDeleteQuickReply
      tags: [agent]
      summary: Delete own quick reply
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
        "404":
          description: Not found

  /admin/quick-replies:
    get:
      operationId: adminListQuickReplies
      tags: [admin]
      summary: List quick replies (all agents, super_admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: agentId
          in: query
          schema:
            type: integer
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Quick replies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuickReplyWithAgent"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
    post:
      operationId: adminCreateQuickReply
      tags: [admin]
      summary: Create quick reply for an agent (super_admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateQuickReplyBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickReplyWithAgent"
        "400":
          description: Validation error
        "401":
          description: Not authenticated
        "403":
          description: Forbidden

  /admin/quick-replies/{id}:
    patch:
      operationId: adminUpdateQuickReply
      tags: [admin]
      summary: Update any quick reply (super_admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuickReplyBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickReplyWithAgent"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: adminDeleteQuickReply
      tags: [admin]
      summary: Delete any quick reply (super_admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
        "404":
          description: Not found

  /admin/transfers:
    get:
      operationId: adminListTransfers
      tags: [admin]
      summary: List recent session transfers (super_admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Transfer records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTransfersResponse"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden

  /admin/logs:
    get:
      operationId: adminListLogs
      tags: [admin]
      summary: List system audit logs (super_admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: action
          in: query
          schema:
            type: string
      responses:
        "200":
          description: System log records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLogsResponse"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Session:
      type: object
      required: [id, visitorNickname, status, createdAt]
      properties:
        id:
          type: integer
        visitorNickname:
          type: string
        visitorId:
          type: ["string", "null"]
        status:
          type: string
          enum: [waiting, active, closed]
        createdAt:
          type: string
          format: date-time
        lastSeenAt:
          type: ["string", "null"]
          format: date-time
        agentId:
          type: ["integer", "null"]

    SessionSummary:
      type: object
      required: [id, visitorNickname, status, createdAt, unreadCount, isOnline]
      properties:
        id:
          type: integer
        visitorNickname:
          type: string
        status:
          type: string
          enum: [waiting, active, closed]
        createdAt:
          type: string
          format: date-time
        lastSeenAt:
          type: ["string", "null"]
          format: date-time
        agentId:
          type: ["integer", "null"]
        agentDisplayName:
          type: ["string", "null"]
        agentAvatarUrl:
          type: ["string", "null"]
        agentIsActive:
          type: ["boolean", "null"]
        unreadCount:
          type: integer
        isOnline:
          type: boolean
        lastMessage:
          type: ["string", "null"]
        lastMessageAt:
          type: ["string", "null"]
          format: date-time
        hasNote:
          type: boolean
          description: Whether a non-empty private note exists for this session
        agentAccess:
          type: string
          enum: [owner, readonly, super_admin]
          description: Current agent's access mode for this session

    SessionTransfer:
      type: object
      required: [id, sessionId, fromAgentId, toAgentId, initiatedBy, createdAt]
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        fromAgentId:
          type: integer
        toAgentId:
          type: integer
        initiatedBy:
          type: integer
        reason:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        fromAgentDisplayName:
          type: ["string", "null"]
        toAgentDisplayName:
          type: ["string", "null"]
        initiatedByDisplayName:
          type: ["string", "null"]
        visitorNickname:
          type: ["string", "null"]

    TransferSessionBody:
      type: object
      required: [targetAgentId]
      properties:
        targetAgentId:
          type: integer
        reason:
          type: string
          maxLength: 500

    TransferSessionResponse:
      type: object
      required: [transfer, session]
      properties:
        transfer:
          $ref: "#/components/schemas/SessionTransfer"
        session:
          $ref: "#/components/schemas/Session"

    SessionTransfersResponse:
      type: object
      required: [transfers]
      properties:
        transfers:
          type: array
          items:
            $ref: "#/components/schemas/SessionTransfer"

    AdminTransfersResponse:
      type: object
      required: [transfers]
      properties:
        transfers:
          type: array
          items:
            $ref: "#/components/schemas/SessionTransfer"

    SystemLog:
      type: object
      required: [id, action, createdAt]
      properties:
        id:
          type: integer
        actorId:
          type: ["integer", "null"]
        actorUsername:
          type: ["string", "null"]
        actorRole:
          type: ["string", "null"]
        action:
          type: string
        targetType:
          type: ["string", "null"]
        targetId:
          type: ["integer", "null"]
        detail:
          type: ["string", "null"]
        ipAddress:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    AdminLogsResponse:
      type: object
      required: [logs]
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/SystemLog"

    SessionNote:
      type: object
      required: [id, sessionId, agentId, content, createdAt, updatedAt, canEdit]
