services:
  api:
    image: node:24-bookworm
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://postgres:123456@host.docker.internal:5433/chatdb
      PORT: "8080"
      JWT_SECRET: local_dev_secret_change_in_production
      NODE_ENV: development
      STORAGE_PROVIDER: local
      CI: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "chmod +x scripts/docker-ensure-deps.sh &&
      scripts/docker-ensure-deps.sh &&
      pnpm --filter @workspace/db exec drizzle-kit push --config ./drizzle.config.ts &&
      node scripts/apply-migrations.mjs &&
      node scripts/seed-admin.mjs &&
      pnpm --filter @workspace/api-server run build &&
      pnpm --filter @workspace/api-server run start"
    ports:
      - "8080:8080"

  visitor-web:
    image: node:24-bookworm
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      PORT: "5173"
      BASE_PATH: /
      NODE_ENV: development
      API_PROXY_TARGET: http://api:8080
      CI: "true"
    command: >
      sh -c "chmod +x scripts/docker-ensure-deps.sh &&
      scripts/docker-ensure-deps.sh &&
      pnpm --filter @workspace/visitor-app run dev"
    ports:
      - "5173:5173"
    depends_on:
      - api

  agent-web:
    image: node:24-bookworm
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      PORT: "5174"
      BASE_PATH: /
      NODE_ENV: development
      API_PROXY_TARGET: http://api:8080
      VITE_ADMIN_APP_URL: http://127.0.0.1:5175
      VITE_VISITOR_APP_URL: http://127.0.0.1:5173
      VITE_VISITOR_BASE_PATH: /
      CI: "true"
    command: >
      sh -c "chmod +x scripts/docker-ensure-deps.sh &&
      scripts/docker-ensure-deps.sh &&
      pnpm --filter @workspace/agent-app run dev"
    ports:
      - "5174:5174"
    depends_on:
      - api

  admin-web:
    image: node:24-bookworm
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      PORT: "5175"
      BASE_PATH: /
      NODE_ENV: development
      API_PROXY_TARGET: http://api:8080
      VITE_AGENT_APP_URL: http://localhost:5174/agent/dashboard
      CI: "true"
    command: >
      sh -c "chmod +x scripts/docker-ensure-deps.sh &&
      scripts/docker-ensure-deps.sh &&
      pnpm --filter @workspace/admin-app run dev"
    ports:
      - "5175:5175"
    depends_on:
      - api

volumes:
  node_modules:
  uploads:
